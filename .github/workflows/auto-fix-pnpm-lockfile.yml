name: Auto-fix pnpm lockfile

# Why this workflow exists:
# Dependabot has a known limitation with pnpm workspaces: when grouped
# updates bump dependencies in `apps/*/package.json`, the root
# `pnpm-lock.yaml` is not regenerated, causing CI's
# `pnpm install --frozen-lockfile` to fail with ERR_PNPM_OUTDATED_LOCKFILE.
# This workflow runs on every Dependabot PR sync, regenerates the lockfile,
# and pushes the fix back to the PR branch automatically.
#
# Security hardening (defense in depth):
# 1. `if:` gates on three conditions to ensure we only run for legitimate
#    Dependabot PRs from the same repository (Dependabot does not fork).
# 2. `pnpm install --ignore-scripts` prevents lifecycle scripts from any
#    new transitive dependency from running with the write-capable token.
#    For lockfile regeneration we don't need scripts to execute.
# 3. PR head ref is only consumed by `actions/checkout` (not interpolated
#    into shell `run:` blocks), so command injection is not possible.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  fix-lockfile:
    name: Regenerate pnpm-lock.yaml
    runs-on: ubuntu-latest
    # Triple gating: actor, PR author, and same-repo head all must be
    # Dependabot. Belt-and-braces against unexpected trigger paths.
    if: |
      github.actor == 'dependabot[bot]'
      && github.event.pull_request.user.login == 'dependabot[bot]'
      && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Regenerate lockfile
        id: regen
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts
          if git diff --quiet pnpm-lock.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pnpm-lock.yaml already in sync; no changes needed"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::pnpm-lock.yaml updated; will commit"
          fi

      - name: Commit and push lockfile
        if: steps.regen.outputs.changed == 'true'
        env:
          AUTHOR_NAME: github-actions[bot]
          AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"
          git add pnpm-lock.yaml
          git commit -m "🔧 chore(deps): regenerate pnpm-lock.yaml [auto]"
          git push
