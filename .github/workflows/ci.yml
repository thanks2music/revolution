name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Job 1: Type checking and linting
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm exec turbo run lint --filter='!mcp-gcp-server'

  # Job 2: Build TypeScript apps
  build:
    name: Build Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend
        run: pnpm build:frontend
        env:
          SKIP_ENV_VALIDATION: 'true'

      - name: Build AI Writer
        run: cd apps/ai-writer && pnpm build
        env:
          CI: 'true'
          # Firebase Client SDK Configuration (public, embedded in bundle)
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          # Server-only secrets are no longer required for CI builds
          # API routes are marked with 'export const dynamic = force-dynamic'
          # which prevents build-time execution of routes that require secrets

      - name: Verify No Secrets in Client Bundle
        run: |
          echo "🔍 Checking AI Writer client bundle for leaked secrets..."

          # More specific search for actual secret values (not code references)
          # Look for actual API key patterns
          if grep -rE "sk-ant-[0-9a-zA-Z]{10,}" apps/ai-writer/.next/static/ 2>/dev/null; then
            echo "❌ ERROR: Anthropic API key found in client bundle!"
            echo "Please ensure all API keys are only used in server-side code."
            exit 1
          else
            echo "✅ No Anthropic API keys found in client bundle"
          fi

          # Check for WordPress auth token patterns (JWT or similar)
          if grep -rE "eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}" apps/ai-writer/.next/static/ 2>/dev/null; then
            echo "❌ ERROR: JWT tokens found in client bundle!"
            echo "Please ensure all auth tokens are only used in server-side code."
            exit 1
          else
            echo "✅ No JWT tokens found in client bundle"
          fi

          # Verify server-only modules are not in client bundle
          if grep -r '"server-only"' apps/ai-writer/.next/static/ 2>/dev/null; then
            echo "❌ ERROR: server-only modules found in client bundle!"
            echo "This indicates server code is being bundled for the client."
            exit 1
          else
            echo "✅ No server-only imports in client bundle"
          fi

          echo "✨ Bundle security verification passed!"

          # Firebase dummy config check
          echo ""
          echo "🔍 Checking for dummy Firebase configuration..."
          if grep -r "AIzaSyDummy-Key-For-CI-Build-Only\|dummy-project\|dummy.firebaseapp.com" apps/ai-writer/.next/static/ 2>/dev/null; then
            echo "❌ ERROR: Dummy Firebase config found in client bundle!"
            echo "Please ensure GitHub Secrets are properly configured."
            exit 1
          else
            echo "✅ No dummy Firebase config found"
          fi

  # Job 3: Run tests (jest, apps/ai-writer)
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        # Run jest directly inside apps/ai-writer rather than the root
        # `turbo run test`, because turbo.json declares `test` with
        # `dependsOn: ["^build"]` — invoking it here would duplicate the
        # build that Job 2 (Build Apps) already runs in parallel.
        # Vision API E2E tests skip themselves when the API keys are
        # absent (existing `it.skip` pattern), so they run only when
        # the corresponding secrets are configured in repo settings.
        #
        # `--testPathIgnorePatterns` excludes three suites that load real
        # YAML fixtures from `apps/ai-writer/config/` or
        # `apps/ai-writer/templates/`. Both directories are gitignored
        # (synced from the private `revolution-templates` repo via
        # `pnpm sync:templates`), so they are absent on CI runners and the
        # `fs.existsSync` assertions inside these suites fail.
        # Local pre-push (`.husky/pre-push`) still runs them because the
        # fixtures are present. Refactoring these to be mock-driven (or
        # syncing templates in CI via SSH key) is a separate backlog item.
        run: |
          cd apps/ai-writer && pnpm exec jest \
            --testPathIgnorePatterns='/node_modules/' \
            --testPathIgnorePatterns='/.next/' \
            --testPathIgnorePatterns='__tests__/services/media-type-mapper.service.test.ts' \
            --testPathIgnorePatterns='__tests__/services/text-placeholder-replacer.service.test.ts' \
            --testPathIgnorePatterns='__tests__/integration/text-placeholder-v1.4.0.integration.test.ts'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

