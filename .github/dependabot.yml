version: 2
updates:
  # Frontend app (Next.js)
  - package-ecosystem: "npm"
    directory: "/apps/frontend"
    schedule:
      # Monthly schedule reduces routine PR noise. Security advisories
      # bypass this and arrive immediately regardless. Dependabot's
      # `monthly` interval runs on day 1 of each month by default.
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Tokyo"
    # Keep PR queue throttled. Security advisories are not counted.
    open-pull-requests-limit: 2
    # Wait 7 days before bumping freshly-released versions; 14 days for majors.
    # Lets the ecosystem catch obvious regressions before we eat them.
    cooldown:
      default-days: 7
      semver-major-days: 14
    reviewers:
      - "thanks2music"
    labels:
      - "dependencies"
      - "frontend"
    # Ignore `@types/node` v25+ (odd-numbered Node releases are non-LTS).
    # This rule only blocks v25+; it does not enforce a specific LTS
    # version — current Active LTS lines (v22, v24) remain bumpable.
    ignore:
      - dependency-name: "@types/node"
        versions:
          - ">=25.0.0"
    # Group all non-major updates (patch + minor) into a single PR per app.
    # Majors stay as individual PRs for review.
    groups:
      non-major-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  # Backend app (WordPress)
  - package-ecosystem: "npm"
    directory: "/apps/backend"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 14
    reviewers:
      - "thanks2music"
    labels:
      - "dependencies"
      - "backend"
    groups:
      non-major-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  # AI Writer app (Next.js)
  - package-ecosystem: "npm"
    directory: "/apps/ai-writer"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
      semver-major-days: 14
    reviewers:
      - "thanks2music"
    labels:
      - "dependencies"
      - "ai-writer"
    # Ignore `@types/node` v25+ (odd-numbered Node releases are non-LTS).
    # This rule only blocks v25+; it does not enforce a specific LTS
    # version — current Active LTS lines (v22, v24) remain bumpable.
    ignore:
      - dependency-name: "@types/node"
        versions:
          - ">=25.0.0"
    groups:
      non-major-updates:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

  # GitHub Actions
  # Note: `cooldown` is not supported for the `github-actions` ecosystem
  # (Dependabot rejects `cooldown.semver-major-days` here even though it
  # works for `npm`). Action major bumps are infrequent and we manually
  # review them anyway, so the absence of cooldown here is acceptable.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
